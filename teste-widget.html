<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Página de Teste - Umbler</title>
  <style>
    body { font-family: sans-serif; padding: 40px; background: #f5f5f5; }
    h1   { color: #1a1a2e; }
    p    { color: #666; margin-top: 12px; }
  </style>
</head>
<body>
  <h1>Página de Teste - Umbler</h1>
  <p>Se o servidor estiver ligado, o widget aparecerá em 2 segundos...</p>

  <script>
    const BASE = window.location.hostname === 'localhost'
      ? 'http://localhost:3000'
      : 'https://projeto-nps-umbler-production.up.railway.app';

    window.UmblerNPS = {
      product:       "hospedagem",
      customer_tier: "pro",
      plan:          "anual",
      api_url:       BASE,
      delay_ms:      2000
    };

    const script = document.createElement('script');
    script.src   = `${BASE}/snippet/embed.js`;
    document.body.appendChild(script);
  </script>
</body>
</html>
